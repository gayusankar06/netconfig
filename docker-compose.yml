version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: netconfig_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: netconfig_diff_db
      POSTGRES_USER: netconfig_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NetConfig@Secure2024!}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netconfig_user -d netconfig_diff_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netconfig_network

  # ─────────────────────────────────────────────
  # Redis Cache & Message Broker
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: netconfig_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-RedisNetConfig2024!}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-RedisNetConfig2024!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netconfig_network

  # ─────────────────────────────────────────────
  # Ollama LLM Platform
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: netconfig_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - netconfig_network

  # ─────────────────────────────────────────────
  # Ollama Model Initializer
  # ─────────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: netconfig_ollama_pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "ollama pull llama3 && echo 'Llama 3 model pulled successfully'"
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    networks:
      - netconfig_network
    restart: "no"

  # ─────────────────────────────────────────────
  # FastAPI Application Server
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netconfig_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://netconfig_user:${POSTGRES_PASSWORD:-NetConfig@Secure2024!}@db:5432/netconfig_diff_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-RedisNetConfig2024!}@redis:6379/0"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "llama3"
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key-in-production-minimum-32-chars!}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      ALLOWED_HOSTS: "*"
    volumes:
      - uploads_data:/tmp/uploads
      - reports_data:/tmp/reports
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - netconfig_network

  # ─────────────────────────────────────────────
  # Celery Background Worker
  # ─────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netconfig_celery_worker
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,analysis,compliance,reports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://netconfig_user:${POSTGRES_PASSWORD:-NetConfig@Secure2024!}@db:5432/netconfig_diff_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-RedisNetConfig2024!}@redis:6379/0"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "llama3"
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key-in-production-minimum-32-chars!}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - uploads_data:/tmp/uploads
      - reports_data:/tmp/reports
    networks:
      - netconfig_network

  # ─────────────────────────────────────────────
  # Celery Scheduler (Beat)
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netconfig_celery_beat
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:-RedisNetConfig2024!}@redis:6379/0"
    networks:
      - netconfig_network

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: netconfig_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - reports_data:/var/www/reports:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - netconfig_network

  # ─────────────────────────────────────────────
  # Prometheus Metrics Collector
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: netconfig_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - netconfig_network

  # ─────────────────────────────────────────────
  # Grafana Dashboard Analytics
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: netconfig_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-GrafanaNetConfig2024!}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
    depends_on:
      - prometheus
    networks:
      - netconfig_network

  # ─────────────────────────────────────────────
  # Alembic Auto Migration Container
  # ─────────────────────────────────────────────
  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netconfig_migrate
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://netconfig_user:${POSTGRES_PASSWORD:-NetConfig@Secure2024!}@db:5432/netconfig_diff_db"
    networks:
      - netconfig_network
    restart: "no"

# ─────────────────────────────────────────────
# Storage Volumes and Network Architecture
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  uploads_data:
    driver: local
  reports_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  netconfig_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
